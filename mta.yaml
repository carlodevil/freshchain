_schema-version: "3.3"
ID: freshchain
version: 0.1.0
description: Smart FreshChain CAP demo slice

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
        - node scripts/prune-hana-seed-data.mjs

modules:
  - name: freshchain-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    properties:
      NODE_ENV: production
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: freshchain-db
      - name: freshchain-auth
      - name: freshchain-ai-core
      - name: freshchain-event-mesh
      - name: freshchain-job-scheduler
    build-parameters:
      builder: custom
      commands:
        - npm install --production

  - name: freshchain-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: freshchain-db

  - name: freshchain-html5-content
    type: com.sap.application.content
    path: .
    requires:
      - name: freshchain-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: freshchain-controltower
          artifacts:
            - freshchaincontroltower.zip
          target-path: resources/
        - name: freshchain-operations
          artifacts:
            - freshchainoperations.zip
          target-path: resources/
        - name: freshchain-overview
          artifacts:
            - freshchainoverview.zip
          target-path: resources/
        - name: freshchain-intelligence
          artifacts:
            - freshchainintelligence.zip
          target-path: resources/
        - name: freshchain-configure
          artifacts:
            - freshchainconfigure.zip
          target-path: resources/
        - name: freshchain-stores
          artifacts:
            - freshchainstores.zip
          target-path: resources/
        - name: freshchain-areas
          artifacts:
            - freshchainareas.zip
          target-path: resources/
        - name: freshchain-sensors
          artifacts:
            - freshchainsensors.zip
          target-path: resources/
        - name: freshchain-products
          artifacts:
            - freshchainproducts.zip
          target-path: resources/
        - name: freshchain-thresholds
          artifacts:
            - freshchainthresholds.zip
          target-path: resources/
        - name: freshchain-impactsettings
          artifacts:
            - freshchainimpactsettings.zip
          target-path: resources/
        - name: freshchain-ingestionerrors
          artifacts:
            - freshchainingestionerrors.zip
          target-path: resources/
        - name: freshchain-admin
          artifacts:
            - freshchainadmin.zip
          target-path: resources/
        - name: freshchain-masterdata
          artifacts:
            - freshchainmasterdata.zip
          target-path: resources/
        - name: freshchain-monitoring
          artifacts:
            - freshchainmonitoring.zip
          target-path: resources/

  - name: freshchain-destination-content
    type: com.sap.application.content
    path: .
    requires:
      - name: freshchain-destination
        parameters:
          content-target: true
      - name: freshchain-html5-repo-host
        parameters:
          service-key:
            name: freshchain-html5-repo-host-key
      - name: freshchain-auth
        parameters:
          service-key:
            name: freshchain-auth-key
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: freshchain-html5-repo-host
              ServiceInstanceName: freshchain-html5-repo-host
              ServiceKeyName: freshchain-html5-repo-host-key
              sap.cloud.service: freshchain
            - Name: freshchain-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: freshchain-auth
              ServiceKeyName: freshchain-auth-key
              sap.cloud.service: freshchain
    build-parameters:
      no-source: true

  - name: freshchain-controltower
    type: html5
    path: app/freshchain-controltower
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - rm -rf dist
        - mkdir -p dist
        - cp -R webapp/. dist/
        - node ../../scripts/zip-html5-app.js dist freshchaincontroltower.zip
      supported-platforms: []

  - name: freshchain-operations
    type: html5
    path: app/freshchain-operations
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - rm -rf dist
        - mkdir -p dist
        - cp -R webapp/. dist/
        - node ../../scripts/zip-html5-app.js dist freshchainoperations.zip
