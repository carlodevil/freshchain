resources:
  - name: freshchain-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: freshchain-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: freshchain-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: freshchain-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                URL: ~{srv-api/srv-url}
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true

  - name: freshchain-ai-core
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: ai-core

  - name: freshchain-event-mesh
    type: org.cloudfoundry.managed-service
    parameters:
      service: enterprise-messaging
      service-plan: default
      config:
        emname: freshchain-event-mesh
        namespace: freshchain/demo/live
        version: "1.1.0"
        options:
          management: true
          messagingrest: true
          messaging: true
        rules:
          topicRules:
            publishFilter:
              - freshchain/sensor/reading/created
            subscribeFilter:
              - freshchain/sensor/reading/created
          queueRules:
            publishFilter:
              - freshchain/live-demo/*
            subscribeFilter:
              - freshchain/live-demo/*

  - name: freshchain-job-scheduler
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: job-scheduler
