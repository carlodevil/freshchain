<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshChain Control Tower</title>
    <script
      id="sap-ui-bootstrap"
      src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-libs="sap.m,sap.ui.core,sap.ovp"
      data-sap-ui-compat-version="edge"
      data-sap-ui-async="true"
      data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
      data-sap-ui-resource-roots='{"freshchain.controltower": "./"}'>
    </script>
  </head>
  <body class="sapUiBody sapUiSizeCompact">
    <div
      data-sap-ui-component
      data-name="freshchain.controltower"
      data-id="container"
      data-settings='{"id":"freshchain.controltower"}'>
    </div>
  </body>
</html>
