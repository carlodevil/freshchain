apiVersion: ai.sap.com/v1alpha1
kind: Executable
metadata:
  name: freshchain-train
  labels:
    scenarios.ai.sap.com/id: freshchain-intelligence
    executables.ai.sap.com/id: freshchain-train
spec:
  scenario: freshchain-intelligence
  description: Train the FreshChain risk and demand model from seeded or ingested operational data.
  image: ${FRESHCHAIN_AI_IMAGE}
  command:
    - python
    - /app/train.py
  inputs:
    parameters:
      - name: datasetCode
        type: string
      - name: historyDays
        type: string
  outputs:
    artifacts:
      - name: freshchain-model
        kind: model
        path: /tmp/freshchain-model
